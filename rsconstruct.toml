# Markdown linting — lint every *.md under exercises/ (the exercise.md files).
[processor.mdl]
src_dirs = ["exercises"]

# Spell checking — run the spell checker over every *.md under exercises/.
# Domain-specific terms (Elasticsearch, Kibana, …) live in .zspell-words.
[processor.zspell]
src_dirs = ["exercises"]

# Python checks. Most *.py files are exercise scripts under exercises/; the
# rest are the project config under config/. ruff covers syntax and lint;
# mypy covers the typing.
[processor.ruff]
src_dirs = ["exercises", "config"]

# Check each file on its own (batch = false): the exercise scripts reuse
# basenames across directories (e.g. ex_1_1.py in several dirs), which mypy's
# batch mode rejects as "duplicate module". Per-file invocation sidesteps that.
[processor.mypy]
src_dirs = ["exercises", "config"]
batch = false

# Shell-script linting — the exercises are driven by *.sh scripts.
[processor.shellcheck]
src_dirs = ["exercises", "config"]
args = ["--severity=error", "--shell=bash"]

[analyzer.markdown]

[analyzer.python]
