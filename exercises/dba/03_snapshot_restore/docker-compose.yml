# Ready-to-use compose file for the snapshot/restore exercise.
#
# You do NOT need to edit this file. Just run it from this directory:
#
#     docker compose up -d
#
# What makes snapshots work here:
#   - path.repo is set to /usr/share/elasticsearch/snapshots (the
#     allow-listed directory a filesystem repository may write to).
#   - That directory is NOT a Docker volume. It is created inside the
#     container by Elasticsearch on first use, owned by the elasticsearch
#     user automatically. No volume means no root-owned mountpoint, so
#     there is nothing to chown and no init container to add.
#
# Trade-off: the snapshot directory is part of the container's writable
# layer, so snapshots are EPHEMERAL. They survive `docker compose
# restart/stop/start` but are wiped by `docker compose down`. That is
# fine for this exercise, where you tear down and redo. Do NOT use this
# layout for snapshots you actually need to keep.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.3
    container_name: elasticsearch
    environment:
      - path.repo=/usr/share/elasticsearch/snapshots
      - node.name=elasticsearch
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # Disable security features for the exercise
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      # No volume for /usr/share/elasticsearch/snapshots on purpose: see
      # the header comment. ES creates and owns it on first use.
    network_mode: host

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.3
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://localhost:9200
      - ELASTICSEARCH_URL=http://localhost:9200
      - xpack.security.enabled=false
      - xpack.encryptedSavedObjects.encryptionKey=fhjskloppd678ehkdfdlliverpoolfcr
    network_mode: host

volumes:
  elasticsearch-data:
    driver: local
